scope: perf
time_limit: 1800
script_args:
  # All arguments referenced in the script string must be specified here.
  # Arguments not referenced in the script string must have the 'arg' field specified.
  # See jet/core/configs.py for the specification of the configuration class
  workspace:
    value: /workspace/bionemo2
    key_segment: False
  data_path:
    value: /data/evo2
    key_segment: False
  additional_args:
    value: ""
    key_segment: False
  model:
    value: evo2
  variant:
    value: train
  precision:
    value: fp8
  gpus:
    value: 8
  max_steps:
    value: 200
  pp:
    value: 1
  acc_grad:
    value: 1
  clip_grad:
    value: 0
  seed:
    value: 3735928559
  lr:
    value: 0.0002
  wd:
    value: 0.1
  products:
    - config_name: 40b
      batch_size: 8
      cp: 1
      tp: 8
      seq_len: 8192
      min_lr: 0.00002
      nodes: 8
      additional_args: "--fp8-wgrad"
    - config_name: 40b_arc_longcontext
      batch_size: 1
      cp: 2
      tp: 64
      seq_len: 1048576
      min_lr: 0.00003
      nodes: 8
    - config_name: 7b_arc_longcontext
      batch_size: 1
      cp: 2
      tp: 32
      seq_len: 1048576
      min_lr: 0.00003
      nodes: 4
    - config_name: 7b
      batch_size: 2
      cp: 1
      tp: 1
      seq_len: 8192
      min_lr: 0.00003
      nodes: 4
      additional_args: "--fp8-wgrad"
script: |-
  WANDB_API_KEY=$BIONEMO_WANDB_API_KEY python ${workspace}/sub-packages/bionemo-evo2/src/bionemo/evo2/run/${variant}.py \
  -d ${workspace}/sub-packages/bionemo-evo2/tests/config/test_dataset_config.yaml \
  --dataset-dir ${data_path} \
  --grad-acc-batches ${acc_grad} \
  --fp8 ${additional_args} \
  --enable-preemption \
  --ckpt-async-save \
  --use-megatron-comm-overlap-llama3-8k \
  --overlap-grad-reduce \
  --clip-grad=${clip_grad} \
  --eod-pad-in-loss-mask \
  --seq-length=${seq_len} \
  --lr=${lr} \
  --wd=${wd} \
  --min-lr=${min_lr} \
  --tensor-parallel-size=${tp} \
  --context-parallel-size=${cp} \
  --pipeline-model-parallel-size=${pp} \
  --sequence-parallel \
  --workers 8 \
  --num-nodes=${nodes} \
  --devices=${gpus} \
  --micro-batch-size=${batch_size} \
  --model-size=${config_name} \
  --max-steps=${max_steps} \
  --limit-val-batches=20 \
  --log-every-n-steps=50 \
  --val-check-interval=${max_steps} \
  --tflops-callback \
  --experiment-dir=${tensorboard_dir} \
  --wandb-project=${wandb_project_name} \
  --wandb-group=${model}_${variant}_${config_name}__${target}__slen${seq_len} \
  --wandb-job-type=${pipeline_label} \
  --disable-checkpointing;
