defaults:
  - defaults
  - _self_

config_name_or_path: ./model_configs/mixtral-8x1B
config_kwargs:
  attn_input_format: thd
  self_attn_mask_type: padding_causal

use_sequence_packing: true
use_meta_device: true
expert_parallel_size: 4
num_train_steps: 500

dataset:
  tokenizer_name_or_path: nvidia/Llama-3.1-8B-Instruct-FP8
  micro_batch_size: 2
  num_workers: 4
  max_seq_length: 4096
  stride: 512
  buffer_size: 50_000
  use_stateful_dataloader: false
  load_dataset_kwargs:
    path: mlfoundations/dclm-baseline-1.0
    data_dir: global-shard_01_of_10
    split: train
    streaming: true

wandb:
  name: agent01-lingua-ep4
  project: swarm-mixtral-development

lr_scheduler_kwargs:
  num_warmup_steps: 50
  num_decay_steps: 450
  min_lr_ratio: 1.0e-6

checkpoint:
  ckpt_dir: /home/user/checkpoints/mixtral-ep-test
  save_final_model: false
  resume_from_checkpoint: false
  save_every_n_steps: 250
  max_checkpoints: 2
  async_save: true

logger:
  frequency: 10
