example_fp8_tensor_stat_collection:
    enabled: True
    layers:
        layer_types: [layernorm_qkv, proj, fc1, fc2]
    transformer_engine:
        LogFp8TensorStats:
            enabled: True
            tensors_struct:
            - tensor: activation
              stats: [underflows%, scale_inv_min, scale_inv_max, mse]
              freq: 10
            - tensor: gradient
              stats: [underflows%, scale_inv_min, scale_inv_max, mse]
              freq: 10
            - tensor: weight
              stats: [underflows%, scale_inv_min, scale_inv_max, mse]
              freq: 10
        LogTensorStats:
          enabled: True
          stats: [max, min, mean, std, l1_norm]
          tensors: [dgrad, wgrad]
          freq: 1
