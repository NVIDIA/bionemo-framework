# OpenGenome2 7B - FP8 Block Scaling, FL1 (first/last 1 layer BF16)
# Uses parquet2 dataset (globally shuffled, corrected data).
#
# Layers 2-31 in FP8 (1-indexed), layers 1 and 32 in BF16.
# GBS = mbs * grad_acc * dp_size = 1 * 8 * 48 = 384

defaults:
  - og2_7b_thd_gqa_fp8
  - _self_

# FL1: first/last 1 layer in BF16
config_kwargs:
  vocab_size: 256
  num_hidden_layers: 32
  hidden_size: 4096
  intermediate_size: 14336
  num_attention_heads: 32
  num_key_value_heads: 8
  max_position_embeddings: 8192
  initializer_range: 0.02
  attn_input_format: thd
  rope_theta: 500000
  rope_scaling:
    rope_type: "llama3"
    factor: 1.0
    low_freq_factor: 1.0
    high_freq_factor: 4.0
    original_max_position_embeddings: 8192
  fp8_first_last_bf16: true
  num_layers_at_start_in_bf16: 1
  num_layers_at_end_in_bf16: 1

# Parquet2 dataset (corrected, globally shuffled)
dataset:
  micro_batch_size: 1
  num_workers: 8
  buffer_size: 10000
  shuffle_windows: true
  load_dataset_kwargs:
    path: "/data/opengenome2/parquet2"
    data_files: null
    split: "train"
    streaming: true

grad_acc_steps: 8

wandb:
  name: og2-7b-fp8-fl1-pq2-bs
  project: llama3-metagenome-7b
