# OpenGenome2 7B - BF16 baseline, 1000 steps from 5k checkpoint
#
# Resumes from the existing 5k BF16 checkpoint and trains for 1000 more steps
# (steps 5001-6000) using HuggingFace streaming metagenomes dataset.
# All layers in BF16 (no FP8). Single-node B300.
#
# Usage:
#   torchrun --nproc_per_node=8 train_fsdp2.py --config-name og2_7b_bf16_1k_from_10k \
#     checkpoint.ckpt_dir=/path/to/checkpoints/bf16_1k_from_5k

defaults:
  - og2_7b_thd_gqa
  - _self_

# Override dataset to use HuggingFace streaming (no local NFS files needed)
dataset:
  micro_batch_size: 3
  buffer_size: 10_000
  num_workers: 8
  load_dataset_kwargs:
    path: "arcinstitute/opengenome2"
    data_dir: "json/pretraining_or_both_phases/metagenomes"
    data_files: null
    split: "train"
    streaming: true

# Train for 6000 total steps (resumes from 5001, runs 1000 new steps)
num_train_steps: 6000
grad_acc_steps: 16

# FP8 disabled (all BF16)
fp8_config:
  enabled: false

# Checkpoint: resume from existing 5k checkpoint
checkpoint:
  ckpt_dir: ???
  save_final_model: true
  resume_from_checkpoint: true
  save_every_n_steps: 200
  max_checkpoints: 3
  async_save: false

# Validation disabled for this short run
validation:
  enabled: false

logger:
  frequency: 1

wandb:
  name: og2-7b-bf16-1k-from-5k
  project: opengenome2-7b
