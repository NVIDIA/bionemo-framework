# Debug config: full OG2 architecture with 2 layers for local init verification.
# Run with: torchrun --nproc_per_node=2 train_fsdp2.py --config-name L0_debug_2layer

defaults:
  - defaults
  - _self_

# Full OG2 architecture but only 2 layers to fit on limited GPU memory
config_name_or_path: meta-llama/Llama-3.1-8B
config_kwargs:
  vocab_size: 256
  num_hidden_layers: 2
  hidden_size: 4096
  intermediate_size: 14336
  num_attention_heads: 32
  num_key_value_heads: 8
  max_position_embeddings: 8192
  initializer_range: 0.02
  attn_input_format: thd
  rope_theta: 500000

# OG2 init features (all enabled, matching production)
spike_no_more_embedding_init: true
use_megatron_scaled_init: true
use_weight_decay_grouping: true
skip_embedding_weight_decay: true
use_fp32_master_weights: true
use_meta_device: false

# Sequence packing (matching production)
use_sequence_packing: true

num_train_steps: 10
grad_acc_steps: 1

dataset:
  tokenizer_name_or_path: ./tokenizers/nucleotide_fast_tokenizer
  micro_batch_size: 1
  num_workers: 0
  max_seq_length: 1024
  stride: 200
  buffer_size: 10_000
  mask_degenerate_bases: true
  uppercase_labels: false
  load_dataset_kwargs:
    path: "parquet"
    data_files: "dlcm_sanity_dataset.parquet"
    split: "train"
    streaming: True

wandb:
  name: "og2_debug_2layer"
  mode: "offline"

lr_scheduler_kwargs:
  num_warmup_steps: 2

checkpoint:
  ckpt_dir: null
  save_final_model: false
  resume_from_checkpoint: false

logger:
  frequency: 1
