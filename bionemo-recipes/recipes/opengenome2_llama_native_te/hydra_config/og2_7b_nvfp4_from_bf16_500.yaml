# Experiment 2: Resume from BF16 step 500 checkpoint, train in NVF4 to step 1500
#
# Resumes from the BF16 from-scratch checkpoint at step 500 and continues
# training in NVF4 for 1000 more steps. Single-node B300, 8 GPUs.
# GBS = mbs(6) * grad_acc(4) * gpus(8) = 192
#
# Usage:
#   torchrun --nproc_per_node=8 train_fsdp2.py --config-name og2_7b_nvfp4_from_bf16_500 \
#     checkpoint.ckpt_dir=/path/to/bf16-scratch-checkpoint

defaults:
  - og2_7b_thd_gqa
  - _self_

config_kwargs:
  vocab_size: 256
  num_hidden_layers: 32
  hidden_size: 4096
  intermediate_size: 14336
  num_attention_heads: 32
  num_key_value_heads: 8
  max_position_embeddings: 8192
  initializer_range: 0.02
  attn_input_format: thd
  rope_theta: 500000
  rope_scaling:
    rope_type: "llama3"
    factor: 1.0
    low_freq_factor: 1.0
    high_freq_factor: 4.0
    original_max_position_embeddings: 8192
  fp8_first_last_bf16: false
  num_layers_at_start_in_bf16: 0
  num_layers_at_end_in_bf16: 0

dataset:
  micro_batch_size: 6
  buffer_size: 10_000
  num_workers: 8
  load_dataset_kwargs:
    path: "json"
    data_files: "/data/data/opengenome2/json/pretraining_or_both_phases/metagenomes/data_metagenomics_train_*.jsonl.gz"
    data_dir: null
    split: "train"
    streaming: true

num_train_steps: 1500
grad_acc_steps: 4

lr_scheduler_kwargs:
  num_warmup_steps: 500
  num_decay_steps: 1000
  min_lr_ratio: 0.000001

fp8_config:
  enabled: false

fp4_config:
  enabled: true
  fp4_recipe: transformer_engine.common.recipe.NVFP4BlockScaling
  fp4_format: "E2M1"
  fp4_recipe_kwargs: {}

checkpoint:
  ckpt_dir: ???
  save_final_model: true
  resume_from_checkpoint: true
  save_every_n_steps: 500
  max_checkpoints: 1
  async_save: false

validation:
  enabled: false

logger:
  frequency: 10

wandb:
  name: og2-7b-nvfp4-from-bf16-500
  project: llama3-metagenome-7b
