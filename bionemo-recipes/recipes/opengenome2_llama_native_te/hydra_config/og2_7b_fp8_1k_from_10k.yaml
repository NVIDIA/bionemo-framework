# OpenGenome2 7B - All FP8, 1000 steps from 5k checkpoint
#
# Resumes from the existing 5k BF16 checkpoint and trains for 1000 more steps
# (steps 5001-6000) using HuggingFace streaming metagenomes dataset.
# ALL layers in FP8 (including first and last). Single-node B300.
#
# Usage:
#   torchrun --nproc_per_node=8 train_fsdp2.py --config-name og2_7b_fp8_1k_from_10k \
#     checkpoint.ckpt_dir=/path/to/checkpoints/fp8_1k_from_5k

defaults:
  - og2_7b_thd_gqa
  - _self_

config_kwargs:
  vocab_size: 256
  num_hidden_layers: 32
  hidden_size: 4096
  intermediate_size: 14336
  num_attention_heads: 32
  num_key_value_heads: 8
  max_position_embeddings: 8192
  initializer_range: 0.02
  attn_input_format: thd
  rope_theta: 500000
  rope_scaling:
    rope_type: "llama3"
    factor: 1.0
    low_freq_factor: 1.0
    high_freq_factor: 4.0
    original_max_position_embeddings: 8192
  # All layers in FP8 (no BF16 overrides)
  fp8_first_last_bf16: false
  num_layers_at_start_in_bf16: 0
  num_layers_at_end_in_bf16: 0

# Override dataset to use HuggingFace streaming (no local NFS files needed)
dataset:
  micro_batch_size: 1
  buffer_size: 10_000
  num_workers: 8
  load_dataset_kwargs:
    path: "arcinstitute/opengenome2"
    data_dir: "json/pretraining_or_both_phases/metagenomes"
    split: "train"
    streaming: true

# Train for 6000 total steps (resumes from 5001, runs 1000 new steps)
num_train_steps: 6000
grad_acc_steps: 8

# FP8 enabled - all layers
fp8_config:
  enabled: true
  fp8_recipe: transformer_engine.common.recipe.Float8BlockScaling
  fp8_format: E4M3
  fp8_recipe_kwargs: {}

# Checkpoint: resume from existing 5k checkpoint
checkpoint:
  ckpt_dir: ???
  save_final_model: true
  resume_from_checkpoint: true
  save_every_n_steps: 200
  max_checkpoints: 3
  async_save: true

# Validation disabled for this short run
validation:
  enabled: false

logger:
  frequency: 1

wandb:
  name: og2-7b-fp8-all-1k-from-5k
  project: opengenome2-7b
