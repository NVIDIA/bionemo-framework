defaults:
  - _self_

job_name: "og2-fp8-agent-1node-demo"
node_group: "yo-bom-lepton-001"
resource_shape: "gpu.8xh100-sxm"

num_nodes: 1
gpus_per_node: 8

# Code paths on NFS
repo_root: "/data/savithas/bionemo-framework"
code_path: "/data/savithas/bionemo-framework/bionemo-recipes/recipes/opengenome2_llama_native_te"
git_branch: "savitha/claude-lepton-dev-experiment"

# Training config (OG2-7B, agent controls fp8_layers via CLI)
hydra_config: "og2_7b_bf16_1k_from_5k"
train_script: "train_fsdp2.py"
num_train_steps: 6000

# Agent config — gradual strategy (expand FP8 from center outward)
checkin_interval: 100
tolerance_pct: 3.0
promotion_strategy: "gradual"
workspace_root: "/data/savithas/agent_runs/demo_1node"
checkpoint_root: "/data/savithas/checkpoints"

# Claude Code config
claude_model: "aws/anthropic/bedrock-claude-opus-4-6"
anthropic_secret: "anthropic.nim.savithas"  # pragma: allowlist secret
anthropic_base_url: "https://inference-api.nvidia.com"

# WandB
wandb_project: "llama3-metagenome-7b"
wandb_secret: "wandb.savithas"  # pragma: allowlist secret

# Baseline (1-node specific)
baseline_logfile: "baseline_bf16_1node.json"

# Warm start from the same 5k BF16 checkpoint
# Agent starts all BF16 (warmup), then gradually adds FP8 from center outward
warm_start:
  enabled: true
  external_checkpoint: "/data/savithas/checkpoints/og2-7b-fp32mw-orig-ws-w1-b50k"  # pragma: allowlist secret
  lkg_step: 5000
  # All layers start in BF16 — agent will expand FP8 from center after warmup
  fp8_layers: []
  demotion_round: 0
  # Gradual strategy pointers (expand from center)
  center_low: 16
  center_high: 17

# Container
container:
  image: "nvcr.io/nvidia/pytorch:26.02-py3"
  registry_auth: "lepton-nvidia-cvai-bnmo-trng"
