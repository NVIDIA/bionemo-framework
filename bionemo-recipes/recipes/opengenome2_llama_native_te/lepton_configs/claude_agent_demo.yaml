defaults:
  - _self_

job_name: "claude-agent-demo"
node_group: "yo-bom-lepton-001"
resource_shape: "gpu.8xh100-sxm"

num_nodes: 1
gpus_per_node: 8

# Code paths on NFS
repo_root: "/data/savithas/bionemo-framework"
code_path: "/data/savithas/bionemo-framework/bionemo-recipes/recipes/opengenome2_llama_native_te"
git_branch: "savitha/claude-lepton-dev-experiment"

# Training config (tiny model for demo)
hydra_config: "L0_sanity"
train_script: "train_fsdp2.py"
num_train_steps: 250

# Agent config
checkin_interval: 50
promotion_strategy: "ends_in"
workspace_root: "/data/savithas/agent_runs/demo"
checkpoint_root: "/data/savithas/checkpoints"

# Claude Code config
claude_model: "aws/anthropic/bedrock-claude-opus-4-6"
anthropic_secret: "anthropic.nim.savithas"  # pragma: allowlist secret
anthropic_base_url: "https://inference-api.nvidia.com"

# WandB
wandb_project: "claude-agent-demo"
wandb_secret: "wandb.savithas"  # pragma: allowlist secret

# Container
container:
  image: "nvcr.io/nvidia/pytorch:26.02-py3"
  registry_auth: "lepton-nvidia-cvai-bnmo-trng"
