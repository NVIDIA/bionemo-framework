# OpenGenome2 7B - FP8 Block Scaling, FL2 (first/last 2 layers BF16)
# Quant stats logging enabled to diagnose fl2 vs fl4 convergence difference.
# Resume from fl2 checkpoint at step 25000.
#
# Layers 3-30 in FP8 (1-indexed), layers 1-2 and 31-32 in BF16.
# GBS = mbs * grad_acc * dp_size = 1 * 8 * 48 = 384
defaults:
  - _self_

job_name: "og2-fp8-fl2-quant-stats"
node_group: "yo-bom-lepton-001"
resource_shape: "gpu.8xh100-sxm"

num_nodes: 6
gpus_per_node: 8
num_train_steps: 182314
micro_batch_size: 1
grad_acc_steps: 8

# Match original fl2 run: jsonl.gz metagenome files (not parquet2)
dataset_path: "json"
data_dir: ""
num_workers: 8
buffer_size: 10000

repo_root: "/data/savithas/bionemo-framework"
code_path: "/data/savithas/bionemo-framework/bionemo-recipes/recipes/opengenome2_llama_native_te"
train_script: "train_fsdp2.py"
hydra_config: "og2_7b_fp8_fl2_quant_stats"

git_branch: "savitha/claude-lepton-dev-experiment"

validation_enabled: false

spike_no_more_embedding_init: true
skip_embedding_weight_decay: true
use_megatron_scaled_init: true
use_weight_decay_grouping: true
use_meta_device: false

# FP8 with first/last 2 layers in BF16 (block scaling)
fp8_enabled: true
fp8_recipe: transformer_engine.common.recipe.Float8BlockScaling
fp8_format: E4M3
use_fp32_master_weights: true

extra_hydra_overrides:
  - "++quant_stats_config.enabled=true"
  - "++quant_stats_config.quant_stats_file=./fp8_debugging_stats.yaml"
  - "++quant_stats_config.quant_log_dir=/data/savithas/checkpoints/og2-7b-fp8-fl2-quant-stats/quant_logs"
  - 'dataset.load_dataset_kwargs.data_files="/data/opengenome2/json/pretraining_or_both_phases/metagenomes/data_metagenomics_train_*.jsonl.gz"'

logger_frequency: 1

# New checkpoint dir for this run's saves and logs
checkpoint_dir: "/data/savithas/checkpoints/og2-7b-fp8-fl2-quant-stats"  # pragma: allowlist secret
save_every_n_steps: 5000
resume_from_checkpoint: true
async_save: false

# Copy step_25000 from original fl2 run into new dir so it resumes from there
pre_training_commands:
  - 'if [ ! -d /data/savithas/checkpoints/og2-7b-fp8-fl2-quant-stats/train_fsdp2/step_25000 ]; then echo "Copying step_25000 checkpoint..."; cp -a /data/savithas/checkpoints/og2-7b-fp8-refactor-bf16-fl2-fp32mw/train_fsdp2/step_25000 /data/savithas/checkpoints/og2-7b-fp8-fl2-quant-stats/train_fsdp2/step_25000; echo "Done."; fi'

wandb_project: "llama3-metagenome-7b"
wandb_name: "og2-7b-fp8-fl2-quant-stats-25k"
wandb_secret: "wandb.savithas"  # pragma: allowlist secret

hf_secret: "HUGGING_FACE_HUB_TOKEN.savithas"  # pragma: allowlist secret

container:
  image: "nvcr.io/nvidia/pytorch:26.02-py3"
  registry_auth: "lepton-nvidia-cvai-bnmo-trng"
