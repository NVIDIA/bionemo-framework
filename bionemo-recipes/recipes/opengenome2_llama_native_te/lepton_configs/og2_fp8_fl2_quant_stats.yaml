defaults:
  - _self_

job_name: "og2-fp8-fl2-quant-stats"
node_group: "yo-bom-lepton-001"
resource_shape: "gpu.8xh100-sxm"

num_nodes: 6
gpus_per_node: 8

# Code paths on NFS
repo_root: "/data/savithas/bionemo-framework"
code_path: "/data/savithas/bionemo-framework/bionemo-recipes/recipes/opengenome2_llama_native_te"
git_branch: "savitha/claude-lepton-dev-experiment"

# Training config
hydra_config: "og2_7b_fp8_fl2_quant_stats"
train_script: "train_fsdp2.py"

# Resume from FL2 FP8 block scaling checkpoint at step 25000
resume_from:
  external_checkpoint: "/data/savithas/checkpoints/og2-7b-fp8-refactor-bf16-fl2-fp32mw"  # pragma: allowlist secret
  step: 25000

# Hydra CLI overrides
hydra_overrides:
  checkpoint.ckpt_dir: "/data/savithas/checkpoints/og2-7b-fp8-fl2-quant-stats"
  checkpoint.resume_from_checkpoint: true
  checkpoint.save_every_n_steps: 5000
  checkpoint.async_save: false

# WandB
wandb_secret: "wandb.savithas"  # pragma: allowlist secret

# Container
container:
  image: "nvcr.io/nvidia/pytorch:26.02-py3"
  registry_auth: "lepton-nvidia-cvai-bnmo-trng"
