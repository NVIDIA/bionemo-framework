# CONTROL EXPERIMENT: Use llama3_native_te code (NOT opengenome2) with OG2 GQA config
# This tests whether the NaN is caused by something in our OG2 code or is purely a TE bug.
# Uses: llama3_native_te/train_fsdp2_cp.py + llama3 modeling_llama_te.py + OG2 GQA model config
# No OG2 features: no MixedPrecisionPolicy, no Spike-No-More, no scaled init, no FP32 master weights
#
# If this NaNs → TE bug confirmed (our OG2 code is not the cause)
# If this works → something in our OG2 code/model causes the NaN
#
# GBS calculation with CP=2:
#   48 total GPUs / 2 CP = 24 DP groups
#   GBS = mbs * grad_acc * dp_size = 2 * 8 * 24 = 384
#
defaults:
  - _self_

job_name: "og2-7b-cp2-llama3-code"
node_group: "yo-bom-lepton-001"
resource_shape: "gpu.8xh100-sxm"

num_nodes: 6
gpus_per_node: 8
num_train_steps: 500
micro_batch_size: 2
grad_acc_steps: 8

# Context Parallelism
cp_size: 2

dataset_path: "/data/opengenome2/parquet2"
data_dir: ""
num_workers: 8
buffer_size: 10000

repo_root: "/data/savithas/bionemo-framework"
# KEY: Use llama3_native_te code, NOT opengenome2
code_path: "/data/savithas/bionemo-framework/bionemo-recipes/recipes/llama3_native_te"
train_script: "train_fsdp2_cp.py"
# Use L0_sanity_cp as base config, override everything for OG2 GQA
hydra_config: "L0_sanity_cp"

git_branch: "savitha/opengenome2-recipe-clean"

# No validation (llama3 CP script has no validation support)
# No OG2-specific features (llama3 code doesn't support them)
use_meta_device: false

fp8_enabled: false

# THD + GQA + CP - the broken combination
use_sequence_packing: true
attn_input_format: "thd"
self_attn_mask_type: "padding_causal"
num_key_value_heads: 8

# Override model architecture to match OG2 7B GQA
extra_hydra_overrides:
  - "++config_name_or_path=meta-llama/Llama-3.1-8B"
  - "++config_kwargs.vocab_size=256"
  - "++config_kwargs.num_hidden_layers=32"
  - "++config_kwargs.hidden_size=4096"
  - "++config_kwargs.intermediate_size=14336"
  - "++config_kwargs.num_attention_heads=32"
  - "++config_kwargs.max_position_embeddings=8192"
  - "++config_kwargs.initializer_range=0.02"
  - "++config_kwargs.rope_theta=500000"
  - "++use_torch_compile=false"
  - "++use_meta_device=false"
  - "++dataset.tokenizer_name_or_path=./tokenizers/nucleotide_fast_tokenizer"
  - "++dataset.max_seq_length=8192"
  - "++dataset.stride=200"
  - "++dataset.mask_degenerate_bases=true"
  - "++dataset.uppercase_labels=false"
  - "++dataset.text_column=text"

logger_frequency: 1

checkpoint_dir: "/data/savithas/checkpoints/og2-7b-cp2-llama3-code"  # pragma: allowlist secret
save_every_n_steps: 5000
async_save: false

wandb_project: "llama3-metagenome-7b"
wandb_name: "og2-7b-cp2-llama3-code"
wandb_secret: "wandb.savithas"  # pragma: allowlist secret

hf_secret: "HUGGING_FACE_HUB_TOKEN.savithas"  # pragma: allowlist secret

exclude_nodes:
  - node-ip-10-50-80-195
  - node-ip-10-50-81-231
  - nvidia-lepton093
  - nvidia-lepton007

container:
  image: "nvcr.io/nvidia/pytorch:25.11-py3"
  registry_auth: "lepton-nvidia-cvai-bnmo-trng"
