# Lingua 70B smoke test for computelab (single node, 8 GPUs, CP=4).
# Streams DCLM from HuggingFace - no local data needed.
# Run from /tmp to avoid Hydra permission issues on read-only mounts.

defaults:
  - L2_lingua_70b
  - _self_

# Absolute path so it works when CWD != recipe dir
config_name_or_path: /workspace/bionemo-framework/bionemo-recipes/recipes/llama3_native_te/model_configs/meta-llama/Llama-3.1-70B

# Single node 8 GPU: CP=4, dp=2, GBS = 1 * 2 * 1 = 2
cp_size: 4
grad_acc_steps: 1
num_train_steps: 300

wandb:
  mode: disabled

logger:
  frequency: 1

dataset:
  load_dataset_kwargs:
    path: mlfoundations/dclm-baseline-1.0-parquet
    data_dir: global-shard_01_of_10
    data_files: null
    split: "train"
    streaming: true

checkpoint:
  ckpt_dir: /tmp/70b_smoke_test
  save_every_n_steps: 999999
