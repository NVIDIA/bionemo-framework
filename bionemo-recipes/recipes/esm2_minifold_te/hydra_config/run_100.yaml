# ESM2-MiniFold TE: 100-step exploratory run
# 2x RTX 5090, frozen ESM-2 650M, synthetic data
# Usage: torchrun --nproc_per_node=2 train_fsdp2.py --config-name run_100

esm_model_name: facebook/esm2_t33_650M_UR50D

num_train_steps: 100

model:
  c_s: 1024
  c_z: 128
  num_blocks: 8
  no_bins: 64
  use_structure_module: false
  num_recycling: 0

dataset:
  dataset_type: synthetic
  micro_batch_size: 2
  max_seq_length: 128
  num_workers: 2
  num_samples: 1000

optimizer:
  folding_lr: 1.0e-4
  struct_lr: 1.0e-4
  backbone_lr: 3.0e-5
  betas: [0.9, 0.98]
  eps: 1.0e-8
  weight_decay: 0.01

lr_scheduler_kwargs:
  num_warmup_steps: 10
  num_training_steps: ${num_train_steps}

checkpoint:
  ckpt_dir: null
  save_final_model: false
  resume_from_checkpoint: false
  save_every_n_steps: 0
  max_checkpoints: 1

mxfp8:
  enabled: false
  tri_proj: false
  tri_gate: false
  ffn: false
  struct_attn: false
  struct_ffn: false
  seq_proj: false
  dist_head: false
  fp8_recipe: transformer_engine.common.recipe.DelayedScaling
  fp8_recipe_kwargs: {}

logger:
  frequency: 5

wandb_init_args:
  project: esm2_minifold_te
  name: run_100_650M_synthetic
  mode: offline
