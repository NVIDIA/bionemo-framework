# ESM2-MiniFold TE: Structure prediction training config
# Usage: torchrun --nproc_per_node=8 train_fsdp2.py --config-name defaults

# ESM-2 backbone
esm_model_name: facebook/esm2_t33_650M_UR50D

# Training
num_train_steps: 500_000

# Model architecture
model:
  c_s: 1024           # Sequence feature dimension
  c_z: 128            # Pair feature dimension
  num_blocks: 48      # MiniFormer blocks
  no_bins: 64         # Distogram bins
  use_structure_module: false  # Stage 1: distogram only
  num_recycling: 0    # No recycling (Stage 1)

# Dataset
dataset:
  dataset_type: parquet
  parquet_path: ???
  tokenizer_name: ${esm_model_name}
  micro_batch_size: 4
  max_seq_length: 256
  num_workers: 4
  num_samples: 10000  # For synthetic dataset

# Optimizer
optimizer:
  folding_lr: 1.0e-4
  struct_lr: 1.0e-4
  backbone_lr: 3.0e-5  # Only used if backbone unfrozen
  betas: [0.9, 0.98]
  eps: 1.0e-8
  weight_decay: 0.01

# LR scheduler
lr_scheduler_kwargs:
  num_warmup_steps: 2_000
  num_training_steps: ${num_train_steps}

# Checkpointing
checkpoint:
  ckpt_dir: ./checkpoints
  save_final_model: true
  resume_from_checkpoint: true
  save_every_n_steps: 1_000
  max_checkpoints: 5

# FP32 master weights (optimizer keeps FP32 copies, forward/backward in BF16)
use_fp32_master_weights: false

# Per-block quantization precision
fp8_config:
  enabled: false
  fp8_recipe: transformer_engine.common.recipe.DelayedScaling
  fp8_format: "HYBRID"
  fp8_recipe_kwargs: {}

fp4_config:
  enabled: false
  fp4_recipe: transformer_engine.common.recipe.NVFP4BlockScaling
  fp4_format: "E2M1"
  fp4_recipe_kwargs: {}

# 1-indexed lists of which MiniFormer blocks use FP8/FP4.
# null means "all blocks" when the corresponding config is enabled.
fp8_layers: null
fp4_layers: null

# Per-component precision overrides within FP8/FP4 blocks.
# Components set to true run in the block's precision; false keeps them in BF16.
# Only meaningful when block-level FP8/FP4 is enabled.
component_precision:
  tri_proj: false      # TriangularUpdateTE input/output projections (pi, po te.Linear layers)
  tri_gate: false      # TriangularUpdateTE sigmoid gates (gi, go te.Linear layers)
  tri_einsum: "off"    # "off" = FP32 (default), "bf16" = ambient dtype (recommended)
  tri_impl: "bmm"      # "einsum" = original path, "bmm" = batched GEMM, "cublas_xbdnn" = optimized BF16 backend
  ffn: true            # TransitionUpdateTE FFN (fc1, fc2 te.Linear layers)
  struct_attn: false   # StructureModuleTE attention projections (proj, o_proj, g_proj te.Linear layers)
  struct_ffn: false    # StructureModuleTE transition MLP (fc1, fc2 te.Linear layers)
  seq_proj: false      # Sequence/pair feature projections (fc_s_1, fc_s_2, fc_z_1, fc_z_2, seq_to_pair te.Linear layers)
  dist_head: false     # Distogram output head (fc_out_1, fc_out_2 te.Linear layers) — kept in model's base precision per MXFP8 paper

# Quantization stats logging (requires nvdlfw_inspect)
quant_stats_config:
  enabled: false
  quant_stats_file: ./fp8_debugging_stats.yaml
  quant_log_dir: ./log_quant_stats
  log_to_wandb: false
  log_heatmap: false

# Logging
logger:
  frequency: 100

# Wandb
wandb_init_args:
  project: esm2_minifold_te
  name: null
  mode: online
