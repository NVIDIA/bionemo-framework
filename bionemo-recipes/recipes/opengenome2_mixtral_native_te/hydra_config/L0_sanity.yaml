defaults:
  - defaults
  - _self_

# Use tiny Mixtral config for fast convergence testing
config_name_or_path: ./model_configs/og2-mixtral-8x1B
config_kwargs:
  hidden_size: 384
  intermediate_size: 1536
  num_hidden_layers: 2
  num_attention_heads: 6
  num_key_value_heads: 6
  num_local_experts: 4
  num_experts_per_tok: 2
  max_position_embeddings: 256
  attn_input_format: bshd
  self_attn_mask_type: causal
  router_jitter_noise: 0.0

num_train_steps: 20

use_torch_compile: false
use_meta_device: false  # small model fits on device directly; avoids meta-device complexity with EP
use_fp32_master_weights: false

# EP=1 for single-GPU sanity testing. Multi-GPU EP tests are in test_fsdp_ep.py.
expert_parallel_size: 1

dataset:
  tokenizer_name_or_path: ./tokenizers/nucleotide_fast_tokenizer
  micro_batch_size: 1
  num_workers: 0
  max_seq_length: 256
  stride: 32
  text_column: sequence
  mask_degenerate_bases: false
  load_dataset_kwargs:
    path: json
    split: train
    data_files: test_genomic_sequences.jsonl
    streaming: true

wandb:
  name: "og2_mixtral_8x1B_sanity"
  mode: "offline"

lr_scheduler_kwargs:
  num_warmup_steps: 10
  num_decay_steps: 240

checkpoint:
  ckpt_dir: null
  save_final_model: false

logger:
  frequency: 1
