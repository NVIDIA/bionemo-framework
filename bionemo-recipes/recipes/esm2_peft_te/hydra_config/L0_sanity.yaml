defaults:
  - defaults
  - _self_

# Training config
model_tag: nvidia/esm2_t48_15B_UR50D # E.g., nvidia/esm2_t6_8M_UR50D or facebook/esm2_t6_8M_UR50D
num_train_steps: 1000
perform_validation: true
validation_interval: 40

# We want this on in CI/CD to validate that the script runs successfully with torch.compile.
use_torch_compile: true

use_sequence_packing: false
dataset:
  use_sanity_dataset: false
  ss3_classification: true
  tokenizer_name: ${model_tag}
  micro_batch_size: 8
  num_workers: 8
  max_seq_length: 1024
  stride: 16
  use_stateful_dataloader: false # Until https://github.com/pytorch/pytorch/pull/163102 is resolved with torchdata.
  validation_samples: 16
  load_dataset_kwargs:
    path: "parquet"
    split: "train"
    data_files: "train.parquet"

# WandB config
wandb_init_args:
  name: "esm2_t6_8M_UR50D_lora_sanity_bruno"
  mode: "online"

# Learning rate scheduler config
lr_scheduler_kwargs:
  num_warmup_steps: 100

checkpoint:
  ckpt_dir: null
  resume_from_checkpoint: true
  save_every_n_steps: 50
  save_final_model: false

logger:
  frequency: 1
