instances:
- url: https://bionemo-framework.docs.buildwithfern.com/bionemo-framework
  custom-domain: docs.nvidia.com/bionemo-framework
title: NVIDIA bionemo framework
footer: ./components/CustomFooter.tsx
layout:
  searchbar-placement: header
  page-width: 1376px
  sidebar-width: 248px
  content-width: 812px
  tabs-placement: header
  hide-feedback: true
colors:
  accentPrimary:
    dark: '#76B900'
    light: '#76B900'
  background:
    light: '#FFFFFF'
    dark: '#000000'
theme:
  page-actions: toolbar
  footer-nav: minimal
logo:
  dark: ./assets/NVIDIA_dark.svg
  light: ./assets/NVIDIA_light.svg
  height: 20
  href: /
  right-text: bionemo framework
favicon: ./assets/NVIDIA_symbol.svg
js:
- url: https://assets.adobedtm.com/5d4962a43b79/c1061d2c5e7b/launch-191c2462b890.min.js
  strategy: beforeInteractive
css:
- ./main.css
navbar-links:
- type: github
  value: https://github.com/NVIDIA/bionemo-framework
experimental:
  mdx-components:
  - ./components
  basepath-aware: true

# Fern Python library reference (run `fern docs md generate` from ./fern). Output is gitignored.
# See fern/AUTODOCS_GUIDE.md
libraries:
  bionemo-core:
    input:
      git: https://github.com/NVIDIA/bionemo-framework
      # Fern needs a directory Pyright treats as a package root. `bionemo` under src is a
      # PEP 420 namespace (no __init__.py); `bionemo/core` is the concrete package.
      subpath: sub-packages/bionemo-core/src/bionemo/core
    output:
      path: ./product-docs/bionemo-core/Full-Library-Reference
    lang: python

versions:
- display-name: Latest
  path: versions/latest.yml
  slug: latest
- display-name: v2.7
  path: versions/v2.7.yml
  slug: v2.7

redirects:
  # Generated by utils/generate_redirects.py — re-run from repo root; see scripts README
  - source: "/bionemo-framework/index.html"
    destination: "/bionemo-framework/v2.7"
  - source: "/bionemo-framework/index"
    destination: "/bionemo-framework/v2.7"
  - source: "/bionemo-framework/v2.7/:path*/index.html"
    destination: "/bionemo-framework/v2.7/:path*"
  - source: "/bionemo-framework/2.7/:path*/index.html"
    destination: "/bionemo-framework/v2.7/:path*"
  - source: "/bionemo-framework/2.7"
    destination: "/bionemo-framework/v2.7"
  - source: "/bionemo-framework/2.7/:path*"
    destination: "/bionemo-framework/v2.7/:path*"
  - source: "/bionemo-framework/:path*/index.html"
    destination: "/bionemo-framework/:path*"
  # Sphinx page URLs (foo.html); must follow all :path*/index.html rules above
  - source: "/bionemo-framework/2.7/:path*.html"
    destination: "/bionemo-framework/v2.7/:path*"
  - source: "/bionemo-framework/:path*.html"
    destination: "/bionemo-framework/:path*"
